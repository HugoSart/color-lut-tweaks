name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check release-please token
        if: ${{ secrets.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "RELEASE_PLEASE_TOKEN is required because this repository does not allow GITHUB_TOKEN to create pull requests."
          echo "Create a fine-grained PAT with Contents: Read and write, Pull requests: Read and write, Metadata: Read, then save it as an Actions secret named RELEASE_PLEASE_TOKEN."
          exit 1

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
