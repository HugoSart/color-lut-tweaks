name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows:
    name: Build Windows Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo build --release
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/color-lut-tweaks | Out-Null
          Copy-Item target/release/color-lut-tweaks.exe dist/color-lut-tweaks/
          Copy-Item target/release/icon.ico dist/color-lut-tweaks/
          Copy-Item target/release/configs dist/color-lut-tweaks/configs -Recurse
          Copy-Item target/release/luts dist/color-lut-tweaks/luts -Recurse
          Compress-Archive -Path dist/color-lut-tweaks -DestinationPath dist/color-lut-tweaks-windows-x64.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/color-lut-tweaks-windows-x64.zip --clobber
