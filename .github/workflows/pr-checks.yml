name: PR Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "release-please*"

permissions:
  contents: read

jobs:

  run-tests:
    name: Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  run-clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features
