name: PR Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "release-please*"

permissions:
  contents: read

jobs:

  run-tests:
    name: Run Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
