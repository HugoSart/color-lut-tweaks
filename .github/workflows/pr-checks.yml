name: PR Checks

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:

  code-validations:
    name: Code Validations
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: j178/prek-action@v2
